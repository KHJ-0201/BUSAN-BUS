<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>교사 지역 배정 시스템</title><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script><script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script><style>body{font-family:'Malgun Gothic',sans-serif;padding:20px;background-color:#f4f4f9}.container{display:flex;gap:20px}.panel{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,.1);flex:1}ul{list-style:none;padding:0}li{padding:10px;border-bottom:1px solid #ddd;cursor:pointer;transition:.2s;display:flex;justify-content:space-between;align-items:center}li:hover{background-color:#f0f0f0}li.active{background-color:#007bff;color:#fff;font-weight:700}.delete-btn{background-color:#dc3545;color:#fff;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:.8em}.region-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:15px}.region-btn{padding:10px;border:1px solid #ccc;background:#fff;border-radius:5px;cursor:pointer}.region-btn.selected{background-color:#28a745;color:#fff;border-color:#28a745}.region-btn:disabled{background-color:#eee;cursor:not-allowed;color:#aaa}button,input[type=file],input[type=text],select{padding:8px;margin-top:5px;cursor:pointer;border-radius:4px;border:1px solid #ccc}.action-btn{background-color:#007bff;color:#fff;border:none;padding:8px 15px}.save-btn{background-color:#dc3545;color:#fff;border:none;padding:15px;width:100%;font-size:1.1em;font-weight:700;border-radius:8px;margin-top:20px;cursor:pointer}.save-btn:hover{background-color:#c82333}.result-box{margin-top:20px;padding:15px;background:#e9ecef;min-height:100px;border-radius:8px;overflow-x:auto}table{width:100%;border-collapse:collapse;text-align:center;margin-top:15px;background:#fff;font-size:.9em}th{background-color:#007bff;color:#fff;height:26px;border:1px solid #ddd;padding:3px}td{border:1px solid #ddd;padding:3px 5px}.teacher-clickable{display:inline-block;padding:1px 4px;margin:1px;border:1px solid #007bff;color:#007bff;background:#fff;border-radius:8px;cursor:pointer;font-size:.72em;letter-spacing:-.5px;transition:.2s}.teacher-clickable:hover{background-color:#007bff;color:#fff}.teacher-clickable.duplicated{border-color:red;color:red;font-weight:700}.teacher-clickable.duplicated:hover{background-color:red;color:#fff}.teacher-clickable.assigned{background-color:#f0f0f0!important;color:#aaa!important;border-color:#ddd!important;cursor:default}.assignment-list{position:relative;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;align-items:center;width:100%;min-height:26px;padding-right:45px;box-sizing:border-box}.assigned-teacher-tag{display:inline-flex;align-items:center;background:0 0;color:#222;padding:2px 4px;font-size:1.15em;font-weight:900;letter-spacing:.5px}.remove-teacher-btn{background:0 0;border:none;color:#dc3545;cursor:pointer;margin-left:4px;padding:0 4px;font-weight:700;font-size:.9em;display:flex;justify-content:center;align-items:center;transition:.2s}.remove-teacher-btn:hover{color:#a71d2a;transform:scale(1.2)}@media (max-width:768px){body{padding:10px}.container{flex-direction:column;gap:15px}.panel{padding:15px;width:100%;box-sizing:border-box}h2{font-size:1.2em;line-height:1.3}.region-grid{grid-template-columns:repeat(3,1fr);gap:8px}.region-btn{padding:12px 5px;font-size:.85em}table{font-size:.75em;min-width:800px}.result-box{padding:5px;border:1px solid #ddd}.action-btn,.save-btn{width:100%;padding:12px;font-size:1em}.teacher-clickable{padding:4px 8px;font-size:.9em;margin:2px}.assigned-teacher-tag{font-size:1em}.assignment-list{min-height:40px}}</style></head><body><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><h2 style="margin:0">🚗 교사 이동 지역 배정 시스템 (마스터 모드)</h2><button style="padding:10px 20px;border-radius:6px;border:none;background-color:#6c757d;color:#fff;font-weight:700;cursor:pointer;font-size:1em" onclick='location.href="index.html"'>🔙 대문(로그인 화면)으로 이동</button></div><div class="container"><div class="panel"><h3>1. 선생님 명단</h3><div style="display:flex;gap:5px"><input type="text" id="teacherName" placeholder="선생님 이름 입력" style="flex:1"> <button class="action-btn" onclick="addTeacher()">명단 추가</button></div><ul id="teacherList"></ul><button class="save-btn" onclick="saveToDatabase()">💾 설정 내용 서버에 저장하기</button></div><div class="panel"><h3>2. 이동 가능 지역 선택</h3><p id="selectionGuide" style="color:#666;font-size:.9em">좌측에서 선생님을 선택하면 지역 설정이 활성화됩니다.</p><div id="regionContainer" class="region-grid"></div></div></div><div class="panel" style="margin-top:20px"><h3>3. 배차 엑셀 업로드 및 자동 배정</h3><p style="color:#666;font-size:.9em">계기판에서 가능 선생님을 클릭하면 배정 선생님 칸으로 이동하며, '전체 선생님 추가'로 모든 목록에서 추가할 수 있습니다.</p><input type="file" id="excelFile" accept=".xlsx, .xls"> <button class="action-btn" onclick="processExcel()">엑셀 분석 및 배정 실행</button><div class="result-box" id="resultArea">배정 결과가 여기에 출력됩니다.</div></div><script src="지역배정.js"></script></body></html>
